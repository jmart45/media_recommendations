<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="page_title">Media Recommendations</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --surface2: #22222e;
    --border: #2e2e3e;
    --accent: #7c6af7;
    --accent2: #a78bfa;
    --text: #e2e2f0;
    --text-muted: #8888aa;
    --user-bubble: #2d2a4a;
    --assistant-bubble: #1e1e2a;
    --star-on: #f0b429;
    --tool-bg: #151520;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* ---- Sidebar ---- */
  #sidebar {
    width: 300px;
    min-width: 220px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #sidebar-header {
    padding: 18px 16px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  #sidebar-header h2 {
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  #sidebar-controls { display: flex; gap: 6px; align-items: center; }

  #lang-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-muted);
    font-size: 0.75rem;
    padding: 3px 6px;
    cursor: pointer;
    outline: none;
    transition: border-color 0.15s, color 0.15s;
  }
  #lang-select:hover, #lang-select:focus { border-color: var(--accent); color: var(--text); }

  #refresh-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 1rem;
    padding: 4px;
    border-radius: 6px;
    transition: color 0.15s, background 0.15s;
  }
  #refresh-btn:hover { color: var(--accent2); background: var(--surface2); }

  #media-list { overflow-y: auto; flex: 1; padding: 8px 0; }

  .media-type-section { margin-bottom: 4px; }

  .media-type-header {
    display: flex;
    align-items: center;
    padding: 8px 16px;
    cursor: pointer;
    user-select: none;
    gap: 8px;
    font-weight: 600;
    font-size: 0.9rem;
    border-radius: 6px;
    margin: 0 8px;
    transition: background 0.12s;
  }
  .media-type-header:hover { background: var(--surface2); }

  .chevron {
    font-size: 0.6rem;
    color: var(--text-muted);
    transition: transform 0.2s;
    margin-left: auto;
  }
  .media-type-header.open .chevron { transform: rotate(90deg); }

  .type-icon { font-size: 1.1rem; }

  .media-items { display: none; padding: 2px 8px 4px 16px; }
  .media-items.open { display: block; }

  .media-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 8px;
    border-radius: 5px;
    font-size: 0.82rem;
    color: var(--text-muted);
    transition: background 0.1s;
  }
  .media-item:hover { background: var(--surface2); color: var(--text); }

  .item-title { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .item-rating {
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--star-on);
    white-space: nowrap;
  }
  .item-rating.unseen { color: var(--text-muted); font-style: italic; }

  .item-genre {
    font-size: 0.7rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 5px;
    color: var(--accent2);
    white-space: nowrap;
  }

  .empty-type {
    padding: 6px 8px;
    font-size: 0.78rem;
    color: var(--text-muted);
    font-style: italic;
  }

  #no-types {
    padding: 24px 16px;
    text-align: center;
    color: var(--text-muted);
    font-size: 0.85rem;
    line-height: 1.6;
  }

  /* ---- Chat ---- */
  #chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  #chat-header {
    padding: 18px 24px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  #chat-header h1 { font-size: 1.1rem; font-weight: 700; }
  #chat-header p { font-size: 0.8rem; color: var(--text-muted); margin-top: 2px; }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .msg { display: flex; gap: 12px; max-width: 840px; width: 100%; align-self: flex-start; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }

  .avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
    flex-shrink: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
  }
  .msg.user .avatar { background: var(--user-bubble); border-color: var(--accent); }

  .bubble {
    background: var(--assistant-bubble);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 0.9rem;
    line-height: 1.65;
    max-width: calc(100% - 50px);
  }
  .msg.user .bubble { background: var(--user-bubble); border-color: var(--accent); }

  .bubble p { margin-bottom: 8px; }
  .bubble p:last-child { margin-bottom: 0; }
  .bubble strong { color: var(--accent2); }
  .bubble ul, .bubble ol { padding-left: 20px; margin: 6px 0; }
  .bubble li { margin: 3px 0; }
  .bubble code { background: var(--tool-bg); padding: 1px 5px; border-radius: 4px; font-size: 0.85em; }

  .tool-call {
    display: flex; align-items: center; gap: 8px;
    background: var(--tool-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 0.78rem;
    color: var(--text-muted);
    font-family: monospace;
    margin: 4px 0;
    max-width: 600px;
  }
  .tool-call .tool-icon { color: var(--accent); }
  .tool-call .tool-name { color: var(--accent2); font-weight: 600; }

  .typing-indicator { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
  .typing-indicator span {
    width: 6px; height: 6px;
    background: var(--text-muted);
    border-radius: 50%;
    animation: bounce 1.2s infinite ease-in-out;
  }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-5px); }
  }

  /* ---- Input ---- */
  #input-area {
    padding: 16px 24px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex; gap: 12px; align-items: flex-end;
  }

  #user-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--text);
    font-size: 0.9rem;
    font-family: inherit;
    resize: none;
    max-height: 160px;
    outline: none;
    transition: border-color 0.15s;
    line-height: 1.5;
  }
  #user-input:focus { border-color: var(--accent); }
  #user-input::placeholder { color: var(--text-muted); }

  #send-btn {
    background: var(--accent);
    border: none;
    border-radius: 10px;
    width: 44px; height: 44px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: #fff;
    font-size: 1.1rem;
    transition: background 0.15s, transform 0.1s;
    flex-shrink: 0;
  }
  #send-btn:hover { background: var(--accent2); }
  #send-btn:active { transform: scale(0.95); }
  #send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
</style>
</head>
<body>

<aside id="sidebar">
  <div id="sidebar-header">
    <h2 data-i18n="sidebar_heading">My Media</h2>
    <div id="sidebar-controls">
      <select id="lang-select" aria-label="Language">
        <option value="en">EN</option>
        <option value="es">ES</option>
      </select>
      <button id="refresh-btn" data-i18n-title="refresh_title" title="Refresh">&#8635;</button>
    </div>
  </div>
  <div id="media-list">
    <div id="no-types">
      <span data-i18n="no_types">No media types yet.</span><br>
      <span data-i18n="no_types_hint">Start chatting to add some!</span>
    </div>
  </div>
</aside>

<main id="chat-area">
  <div id="chat-header">
    <h1 data-i18n="chat_heading">🎬 Media Recommendations</h1>
    <p data-i18n="chat_subtitle">Chat to track media, ratings, and get personalized recommendations.</p>
  </div>
  <div id="messages">
    <div class="msg assistant" id="welcome-msg">
      <div class="avatar">&#129302;</div>
      <div class="bubble" id="welcome-bubble"></div>
    </div>
  </div>
  <div id="input-area">
    <textarea id="user-input" rows="1" data-i18n-placeholder="input_placeholder"
      placeholder="Ask me to track media or get recommendations..."></textarea>
    <button id="send-btn" data-i18n-title="send_title" title="Send">&#10148;</button>
  </div>
</main>

<script>
// ---- i18n ----

const SUPPORTED_LANGS = ['en', 'es'];
let strings = {};

async function loadLocale(lang) {
  const res = await fetch(`/static/locales/${lang}.json`);
  strings = await res.json();

  document.documentElement.lang = lang;
  localStorage.setItem('lang', lang);

  // Apply to all data-i18n elements
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (strings[key] !== undefined) el.textContent = strings[key];
  });

  // Apply placeholder attributes
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    const key = el.getAttribute('data-i18n-placeholder');
    if (strings[key] !== undefined) el.placeholder = strings[key];
  });

  // Apply title attributes
  document.querySelectorAll('[data-i18n-title]').forEach(el => {
    const key = el.getAttribute('data-i18n-title');
    if (strings[key] !== undefined) el.title = strings[key];
  });

  document.title = strings.page_title || document.title;

  renderWelcomeMessage();
}

function t(key) {
  return strings[key] || key;
}

// ---- Welcome message ----

function renderWelcomeMessage() {
  const bubble = document.getElementById('welcome-bubble');
  const items = strings.welcome_items || [];
  bubble.innerHTML = `
    <p>${escHtml(t('welcome_intro'))}</p>
    <ul>
      ${items.map(item =>
        `<li><strong>${escHtml(item.label)}</strong> — e.g. "${escHtml(item.example)}"</li>`
      ).join('')}
    </ul>
    <p>${escHtml(t('welcome_outro'))}</p>
  `;
}

// ---- Sidebar ----

const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');
const mediaListEl = document.getElementById('media-list');
const noTypesEl = document.getElementById('no-types');

let history = [];

const TYPE_ICONS = {
  movies: '🎬', movie: '🎬',
  games: '🎮', game: '🎮',
  music: '🎵',
  books: '📚', book: '📚',
  tv: '📺', 'tv shows': '📺', shows: '📺',
  anime: '⛩️',
  podcasts: '🎙️', podcast: '🎙️',
};

function getTypeIcon(name) {
  return TYPE_ICONS[name.toLowerCase()] || '📁';
}

function formatRating(rating) {
  if (rating === null || rating === undefined) return null;
  return `★ ${rating % 1 === 0 ? rating + '.0' : rating}`;
}

let openSections = new Set();

async function loadMedia() {
  try {
    const res = await fetch('/api/media');
    const data = await res.json();
    renderSidebar(data.data || {});
  } catch (e) {
    console.error('Failed to load media:', e);
  }
}

function renderSidebar(data) {
  const types = Object.keys(data);
  if (types.length === 0) {
    mediaListEl.innerHTML = '';
    mediaListEl.appendChild(noTypesEl);
    return;
  }
  noTypesEl.remove();
  mediaListEl.innerHTML = '';

  for (const typeName of types.sort()) {
    const items = data[typeName];
    const isOpen = openSections.has(typeName);

    const section = document.createElement('div');
    section.className = 'media-type-section';

    const header = document.createElement('div');
    header.className = 'media-type-header' + (isOpen ? ' open' : '');
    header.innerHTML = `
      <span class="type-icon">${getTypeIcon(typeName)}</span>
      <span>${escHtml(typeName)}</span>
      <span style="color:var(--text-muted);font-size:0.75rem;margin-left:4px">${items.length}</span>
      <span class="chevron">&#9658;</span>
    `;

    const itemsEl = document.createElement('div');
    itemsEl.className = 'media-items' + (isOpen ? ' open' : '');

    if (items.length === 0) {
      itemsEl.innerHTML = `<div class="empty-type">${escHtml(t('no_items'))}</div>`;
    } else {
      for (const item of items.sort((a, b) => a.title.localeCompare(b.title))) {
        const div = document.createElement('div');
        div.className = 'media-item';
        const ratingStr = formatRating(item.rating);
        div.innerHTML = `
          <span class="item-title" title="${escHtml(item.title)}">${escHtml(item.title)}</span>
          ${item.genre ? `<span class="item-genre">${escHtml(item.genre)}</span>` : ''}
          ${ratingStr !== null
            ? `<span class="item-rating">${escHtml(ratingStr)}</span>`
            : `<span class="item-rating unseen">${escHtml(t('unrated'))}</span>`}
        `;
        itemsEl.appendChild(div);
      }
    }

    header.addEventListener('click', () => {
      const open = header.classList.toggle('open');
      itemsEl.classList.toggle('open', open);
      if (open) openSections.add(typeName); else openSections.delete(typeName);
    });

    section.appendChild(header);
    section.appendChild(itemsEl);
    mediaListEl.appendChild(section);
  }
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ---- Chat ----

function addMessage(role, content) {
  const msg = document.createElement('div');
  msg.className = `msg ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = role === 'user' ? '👤' : '🤖';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  if (typeof content === 'string') {
    bubble.innerHTML = markdownToHtml(content);
  } else {
    bubble.appendChild(content);
  }

  msg.appendChild(avatar);
  msg.appendChild(bubble);
  messagesEl.appendChild(msg);
  scrollToBottom();
  return bubble;
}

function addTypingIndicator() {
  const msg = document.createElement('div');
  msg.className = 'msg assistant';
  msg.id = 'typing';
  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = '🤖';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
  msg.appendChild(avatar);
  msg.appendChild(bubble);
  messagesEl.appendChild(msg);
  scrollToBottom();
  return msg;
}

function removeTypingIndicator() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

function addToolCall(name, input) {
  const div = document.createElement('div');
  div.className = 'tool-call';
  div.innerHTML = `<span class="tool-icon">⚙</span> <span class="tool-name">${escHtml(name)}</span> <span>${escHtml(JSON.stringify(input))}</span>`;
  return div;
}

function markdownToHtml(text) {
  return text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/^#{1,3} (.+)$/gm, '<strong>$1</strong>')
    .replace(/^\* (.+)$/gm, '• $1')
    .replace(/^- (.+)$/gm, '• $1')
    .replace(/^\d+\. (.+)$/gm, '• $1')
    .split(/\n\n+/).map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`).join('');
}

function scrollToBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || sendBtn.disabled) return;

  inputEl.value = '';
  inputEl.style.height = 'auto';
  sendBtn.disabled = true;

  addMessage('user', text);
  history.push({ role: 'user', content: text });

  addTypingIndicator();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history })
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let assistantText = '';
    let assistantBubble = null;
    let toolContainer = null;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        let evt;
        try { evt = JSON.parse(line.slice(6)); } catch { continue; }

        if (evt.type === 'text') {
          if (!assistantBubble) {
            removeTypingIndicator();
            const msg = document.createElement('div');
            msg.className = 'msg assistant';
            const av = document.createElement('div');
            av.className = 'avatar';
            av.textContent = '🤖';
            assistantBubble = document.createElement('div');
            assistantBubble.className = 'bubble';
            msg.appendChild(av);
            msg.appendChild(assistantBubble);
            messagesEl.appendChild(msg);
          }
          assistantText += evt.content;
          assistantBubble.innerHTML = markdownToHtml(assistantText);
          scrollToBottom();
        } else if (evt.type === 'tool_call') {
          if (!toolContainer) {
            toolContainer = document.createElement('div');
            if (assistantBubble) {
              assistantBubble.appendChild(toolContainer);
            } else {
              removeTypingIndicator();
              const msg = document.createElement('div');
              msg.className = 'msg assistant';
              const av = document.createElement('div');
              av.className = 'avatar';
              av.textContent = '🤖';
              assistantBubble = document.createElement('div');
              assistantBubble.className = 'bubble';
              assistantBubble.appendChild(toolContainer);
              msg.appendChild(av);
              msg.appendChild(assistantBubble);
              messagesEl.appendChild(msg);
            }
          }
          toolContainer.appendChild(addToolCall(evt.name, evt.input));
          scrollToBottom();
        } else if (evt.type === 'refresh_media') {
          loadMedia();
        } else if (evt.type === 'done') {
          removeTypingIndicator();
          if (assistantText) {
            history.push({ role: 'assistant', content: assistantText });
          }
        }
      }
    }
  } catch (e) {
    removeTypingIndicator();
    addMessage('assistant', t('error_message'));
    console.error(e);
  }

  sendBtn.disabled = false;
  inputEl.focus();
}

// ---- Event Listeners ----

sendBtn.addEventListener('click', sendMessage);

inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
});

document.getElementById('refresh-btn').addEventListener('click', loadMedia);

document.getElementById('lang-select').addEventListener('change', (e) => {
  loadLocale(e.target.value).then(loadMedia);
});

// ---- Init ----

const savedLang = localStorage.getItem('lang') || 'en';
const langSelect = document.getElementById('lang-select');
if (SUPPORTED_LANGS.includes(savedLang)) langSelect.value = savedLang;

loadLocale(savedLang).then(loadMedia);
</script>
</body>
</html>
